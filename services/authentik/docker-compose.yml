# =============================================================================
# Authentik - SSO + App Launcher
# =============================================================================
# Source : https://goauthentik.io/docs/install-config/install/docker-compose
# Customisé pour intégration AI Box (network partagé, secrets via .env racine)
# =============================================================================

name: aibox-authentik

services:
  authentik-postgres:
    image: postgres:16-alpine
    container_name: aibox-authentik-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik
      POSTGRES_PASSWORD: ${PG_AUTHENTIK_PASSWORD}
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - aibox_net

  authentik-redis:
    image: redis:7-alpine
    container_name: aibox-authentik-redis
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - aibox_net

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION:-2025.10.0}
    container_name: aibox-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_AUTHENTIK_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${ADMIN_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - authentik_media:/media
      - authentik_custom_templates:/templates
    ports:
      - "9000:9000"   # HTTP — bindé LAN/VPN, NPM proxiera pour TLS WAN
      # 9443 retiré : conflit avec Portainer. NPM fait le TLS externe.
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - aibox_net

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION:-2025.10.0}
    container_name: aibox-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_AUTHENTIK_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik_media:/media
      - authentik_certs:/certs
      - authentik_custom_templates:/templates
    depends_on:
      authentik-postgres:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - aibox_net

volumes:
  authentik_postgres_data:
  authentik_redis_data:
  authentik_media:
  authentik_certs:
  authentik_custom_templates:

networks:
  aibox_net:
    name: ${NETWORK_NAME:-aibox_net}
    external: true
