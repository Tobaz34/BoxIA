# =============================================================================
# AI Box — Portail de setup embarqué (first-run wizard)
# =============================================================================
# S'exécute au premier démarrage de la box. Sert un wizard sur :80 jusqu'à
# ce que /srv/ai-stack/.configured existe. Ensuite ce stack peut être stoppé
# pour laisser la place à NPM (qui prendra :80 / 443 pour le dashboard final).
# =============================================================================

name: aibox-setup

services:

  # ---- API + Wizard (FastAPI + Jinja2) -----------------------------------
  setup-api:
    build:
      context: ./app
    container_name: aibox-setup-api
    restart: unless-stopped
    volumes:
      # Accès au repo AI Box pour générer .env et lancer install.sh
      - /srv/ai-stack:/srv/ai-stack
      # Accès au socket Docker pour piloter les containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Marqueur "configuré"
      - aibox_setup_state:/state
    environment:
      AIBOX_ROOT: /srv/ai-stack
      STATE_FILE: /state/configured
      PYTHONUNBUFFERED: "1"
      # NOTE — Les CF_DEFAULT_* (Cloudflare master credentials) sont volontairement
      # PAS définies ici, car Compose donne priorité à `environment:` sur `env_file:`
      # (cf. https://docs.docker.com/compose/how-tos/environment-variables/envvars-precedence/).
      # Si on les déclarait avec `${VAR:-}`, une var absente du shell vaudrait `""`
      # et écraserait silencieusement la valeur lue depuis cloudflare.env. Ces vars
      # passent donc UNIQUEMENT par env_file (cf. ci-dessous), où le wizard les lit
      # via os.getenv(). Pour overrider en dev, exporter les vars dans le shell qui
      # lance compose ne suffira PAS — éditer directement /etc/aibox-master/cloudflare.env.
    env_file:
      # Master credentials Cloudflare BoxIA — survivent au wipe car hors /srv/ai-stack/.
      # Source de vérité unique pour les CF_DEFAULT_* (cf. note dans environment).
      # Le `required: false` permet au wizard de démarrer même si le fichier n'existe
      # pas (cas 1re install dev sans CF) → le wizard détectera CF_DEFAULT_API_TOKEN
      # vide et affichera la section « credentials » au client.
      # Format attendu (KEY=VALUE, une par ligne, pas de quotes, pas d'espaces) :
      #   CF_DEFAULT_ACCOUNT_ID=...
      #   CF_DEFAULT_TUNNEL_ID=...
      #   CF_DEFAULT_API_TOKEN=...
      #   CF_DEFAULT_ZONE_ID=...
      #   CF_DEFAULT_ROOT_DOMAIN=ialocal.pro   (optionnel)
      # Permissions recommandées : 600 root:root.
      - path: /etc/aibox-master/cloudflare.env
        required: false
    networks:
      - aibox_net
      - ollama_net   # pour atteindre n8n / open-webui hérités
    extra_hosts:
      # Permet d'atteindre les services exposés en host port (n8n :5678,
      # services sur des networks legacy non joignables) via host.docker.internal.
      - "host.docker.internal:host-gateway"

  # ---- Caddy (reverse proxy + serveur statique) --------------------------
  setup-caddy:
    image: caddy:2-alpine
    container_name: aibox-setup-caddy
    restart: unless-stopped
    ports:
      - "${SETUP_PORT:-80}:80"      # 80 par défaut, surchargeable pour tests cohabitation NPM
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - aibox_setup_caddy_data:/data
    depends_on:
      - setup-api
    networks:
      - aibox_net
      - ollama_net

volumes:
  aibox_setup_state:
    name: aibox_setup_state
  aibox_setup_caddy_data:
    name: aibox_setup_caddy_data

networks:
  aibox_net:
    name: ${NETWORK_NAME:-aibox_net}
    external: true
  ollama_net:
    name: ollama_net
    external: true
