# =============================================================================
# Dify - Plateforme d'agents IA no-code
# =============================================================================
# Source upstream: https://github.com/langgenius/dify
# Composition simplifiée pour AI Box (Postgres+Redis+Sandbox+SSRF dédiés)
# Vector store pointé sur Qdrant externe (notre stack)
# =============================================================================

name: aibox-dify

services:

  # ---- DB DÉDIÉE DIFY ----------------------------------------------------
  dify-db:
    image: postgres:15-alpine
    container_name: aibox-dify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_DIFY_PASSWORD}
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - dify_db_data:/var/lib/postgresql/data
      # Crée automatiquement la DB `dify_plugin` au 1er démarrage de Postgres
      # (le plugin-daemon en a besoin, séparée de la DB Dify principale).
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dify"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - aibox_net

  # ---- REDIS DÉDIÉ DIFY --------------------------------------------------
  dify-redis:
    image: redis:7-alpine
    container_name: aibox-dify-redis
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - dify_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 5
    networks:
      - aibox_net

  # ---- SANDBOX (exécution code des agents) -------------------------------
  dify-sandbox:
    image: langgenius/dify-sandbox:0.2.10
    container_name: aibox-dify-sandbox
    restart: unless-stopped
    environment:
      API_KEY: ${DIFY_SECRET_KEY}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: "true"
      HTTP_PROXY: http://dify-ssrf-proxy:3128
      HTTPS_PROXY: http://dify-ssrf-proxy:3128
      SANDBOX_PORT: 8194
    volumes:
      - dify_sandbox_deps:/dependencies
    networks:
      - aibox_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 30s
      timeout: 5s

  # ---- SSRF PROXY (sécurité requests sortants des agents) ----------------
  dify-ssrf-proxy:
    image: ubuntu/squid:latest
    container_name: aibox-dify-ssrf-proxy
    restart: unless-stopped
    networks:
      - aibox_net

  # ---- API (backend Dify) -------------------------------------------------
  dify-api:
    image: langgenius/dify-api:${DIFY_VERSION:-1.10.1}
    container_name: aibox-dify-api
    restart: unless-stopped
    environment:
      MODE: api
      LOG_LEVEL: INFO
      SECRET_KEY: ${DIFY_SECRET_KEY}
      INIT_PASSWORD: ${ADMIN_PASSWORD}
      CONSOLE_API_URL: ""
      CONSOLE_WEB_URL: ""
      SERVICE_API_URL: ""
      APP_API_URL: ""
      APP_WEB_URL: ""
      FILES_URL: ""
      MIGRATION_ENABLED: "true"
      DB_USERNAME: postgres
      DB_PASSWORD: ${PG_DIFY_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://dify-redis:6379/1
      # ---- Vector store : Qdrant (notre stack partagée) ------------------
      VECTOR_STORE: qdrant
      QDRANT_URL: http://aibox-qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      # ---- LLM provider (Ollama local) -----------------------------------
      OLLAMA_BASE_URL: http://ollama:11434
      # ---- Stockage objets (local par défaut) ----------------------------
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      # ---- Sandbox -------------------------------------------------------
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SECRET_KEY}
      # ---- SSRF ----------------------------------------------------------
      SSRF_PROXY_HTTP_URL: http://dify-ssrf-proxy:3128
      SSRF_PROXY_HTTPS_URL: http://dify-ssrf-proxy:3128
      # ---- Plugin daemon (Dify 1.x : providers/tools/embedded models) ----
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      INNER_API_KEY_FOR_PLUGIN: ${DIFY_INNER_API_KEY}
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
    volumes:
      - dify_api_storage:/app/api/storage
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    networks:
      - aibox_net

  # ---- WORKER (jobs async : embeddings, indexation RAG, etc.) ------------
  dify-worker:
    image: langgenius/dify-api:${DIFY_VERSION:-1.10.1}
    container_name: aibox-dify-worker
    restart: unless-stopped
    environment:
      MODE: worker
      LOG_LEVEL: INFO
      SECRET_KEY: ${DIFY_SECRET_KEY}
      DB_USERNAME: postgres
      DB_PASSWORD: ${PG_DIFY_PASSWORD}
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://dify-redis:6379/1
      VECTOR_STORE: qdrant
      QDRANT_URL: http://aibox-qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OLLAMA_BASE_URL: http://ollama:11434
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: ${DIFY_SECRET_KEY}
      SSRF_PROXY_HTTP_URL: http://dify-ssrf-proxy:3128
      SSRF_PROXY_HTTPS_URL: http://dify-ssrf-proxy:3128
      # Plugin daemon (idem dify-api)
      PLUGIN_DAEMON_URL: http://dify-plugin-daemon:5002
      PLUGIN_DAEMON_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      INNER_API_KEY_FOR_PLUGIN: ${DIFY_INNER_API_KEY}
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
    volumes:
      - dify_api_storage:/app/api/storage
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
    networks:
      - aibox_net

  # ---- PLUGIN DAEMON (Dify 1.x : runtime des plugins providers/tools) ----
  # Sans ce service, /console/api/workspaces/current/model-providers retourne
  # une 400 "Failed to request plugin daemon" et aucun modèle ne peut être
  # configuré. Communique avec dify-api par INNER_API + clé partagée.
  dify-plugin-daemon:
    image: langgenius/dify-plugin-daemon:0.6.0-local
    container_name: aibox-dify-plugin-daemon
    restart: unless-stopped
    environment:
      DB_HOST: dify-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: ${PG_DIFY_PASSWORD}
      DB_DATABASE: dify_plugin
      REDIS_HOST: dify-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      REDIS_USE_SSL: "false"
      SERVER_PORT: 5002
      SERVER_KEY: ${DIFY_PLUGIN_DAEMON_KEY}
      MAX_PLUGIN_PACKAGE_SIZE: 52428800
      PPROF_ENABLED: "false"
      DIFY_INNER_API_URL: http://dify-api:5001
      DIFY_INNER_API_KEY: ${DIFY_INNER_API_KEY}
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
      PLUGIN_WORKING_PATH: /app/storage/cwd
      PLUGIN_INSTALLED_PATH: plugin
      PLUGIN_PACKAGE_CACHE_PATH: plugin_packages
      PLUGIN_MEDIA_CACHE_PATH: assets
      # FORCE_VERIFYING_SIGNATURE désactivé : on installe depuis le
      # marketplace officiel mais aussi potentiellement depuis des
      # plugins locaux non signés en dev.
      FORCE_VERIFYING_SIGNATURE: "false"
      PYTHON_ENV_INIT_TIMEOUT: 120
      PLUGIN_MAX_EXECUTION_TIMEOUT: 600
      PIP_MIRROR_URL: ""
      MARKETPLACE_ENABLED: "true"
      MARKETPLACE_API_URL: https://marketplace.dify.ai
    volumes:
      - dify_plugin_daemon:/app/storage
    depends_on:
      dify-db:
        condition: service_healthy
    networks:
      - aibox_net

  # ---- WEB (frontend) ----------------------------------------------------
  dify-web:
    image: langgenius/dify-web:${DIFY_VERSION:-1.10.1}
    container_name: aibox-dify-web
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: ""
      APP_API_URL: ""
      NEXT_TELEMETRY_DISABLED: 1
    networks:
      - aibox_net

  # ---- NGINX (reverse proxy interne Dify, expose un seul port) -----------
  dify-nginx:
    image: nginx:latest
    container_name: aibox-dify-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8081:80"   # Bindé LAN/VPN. NPM externe proxiera pour TLS WAN.
    depends_on:
      - dify-api
      - dify-web
    networks:
      - aibox_net

volumes:
  dify_db_data:
  dify_redis_data:
  dify_sandbox_deps:
  dify_api_storage:
  dify_plugin_daemon:

networks:
  aibox_net:
    name: ${NETWORK_NAME:-aibox_net}
    external: true
