# =============================================================================
# Squid SSRF proxy whitelist — autorise host.docker.internal:3100 (aibox-app)
# pour que les Custom Tools Dify (BoxIA Concierge / Gmail / RAG Search / …)
# puissent atteindre les endpoints `/api/agents-tools/*` côté Next.js.
#
# Cf services/dify/docker-compose.yml — bind-monté sur
# /etc/squid/conf.d/allow-boxia.conf (squid.conf inclut tous les fichiers
# de ce dossier).
# =============================================================================

# host.docker.internal résout vers la gateway Docker (172.x.0.1) grâce à
# extra_hosts:host-gateway dans le compose. ACL sur le hostname (Squid
# resolve DNS au moment de la requête).
acl boxia_app dstdomain host.docker.internal
acl boxia_app_port port 3100

# Allow BEFORE le `http_access deny all` final du squid.conf de base.
# Squid lit les règles en ordre et stoppe au premier match.
http_access allow boxia_app boxia_app_port
