# =============================================================================
# AI Box — Monitoring (Prometheus + Grafana + Loki + Promtail + DCGM)
# =============================================================================

name: aibox-monitoring

services:

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: aibox-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - aibox_net

  loki:
    image: grafana/loki:3.3.2
    container_name: aibox-loki
    restart: unless-stopped
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - aibox_net

  promtail:
    image: grafana/promtail:3.3.2
    container_name: aibox-promtail
    restart: unless-stopped
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - aibox_net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: aibox-grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${ADMIN_USERNAME:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
    networks:
      - aibox_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: aibox-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - aibox_net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: aibox-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    networks:
      - aibox_net

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.9-3.6.1-ubuntu22.04
    container_name: aibox-dcgm-exporter
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, utility]
    networks:
      - aibox_net

volumes:
  prometheus_data:
    name: aibox_prometheus_data
  loki_data:
    name: aibox_loki_data
  grafana_data:
    name: aibox_grafana_data

networks:
  aibox_net:
    name: ${NETWORK_NAME:-aibox_net}
    external: true
