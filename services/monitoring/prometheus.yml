global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["aibox-node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["aibox-cadvisor:8080"]

  - job_name: dcgm
    static_configs:
      - targets: ["aibox-dcgm-exporter:9400"]

  - job_name: ollama
    metrics_path: /metrics
    static_configs:
      - targets: ["ollama:11434"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["aibox-qdrant:6333"]
