name: aibox-conn-accounting-pennylane

services:
  pennylane:
    build: .
    image: aibox-conn-pennylane:0.1.0
    container_name: aibox-conn-pennylane
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8000"
    environment:
      PENNYLANE_TOKEN: ${PENNYLANE_TOKEN:?PENNYLANE_TOKEN required}
      PENNYLANE_BASE_URL: ${PENNYLANE_BASE_URL:-https://app.pennylane.com/api/external/v1}
      PENNYLANE_TOOL_API_KEY: ${PENNYLANE_TOOL_API_KEY:?PENNYLANE_TOOL_API_KEY required}
      TENANT_ID: ${CLIENT_NAME:-default}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - aibox_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m
    mem_reservation: 64m

networks:
  aibox_net:
    name: ${NETWORK_NAME:-aibox_net}
    external: true
