name: aibox-conn-rag-msgraph

services:
  rag-msgraph:
    build: .
    container_name: aibox-conn-rag-msgraph
    restart: unless-stopped
    environment:
      # AUTH_MODE=oauth → utilise le token User OAuth saisi via /connectors UI
      # (cf services/app/src/lib/oauth-oidc.ts). Indexe OneDrive du user.
      # AUTH_MODE=client_credentials → App-only avec admin consent (legacy).
      AUTH_MODE: ${RAG_MSGRAPH_AUTH_MODE:-oauth}
      # ---- Mode OAuth ----
      OAUTH_API_BASE: ${OAUTH_API_BASE:-http://localhost:3100}
      CONNECTOR_INTERNAL_TOKEN: ${CONNECTOR_INTERNAL_TOKEN:-}
      OAUTH_CONNECTOR_SLUG: ${OAUTH_CONNECTOR_SLUG_ONEDRIVE:-onedrive}
      # ---- Mode client_credentials (legacy) ----
      MS_TENANT_ID: ${MS_TENANT_ID:-}
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET:-}
      MS_DRIVE_ID: ${MS_DRIVE_ID:-}
      MS_SITE_ID: ${MS_SITE_ID:-}
      # ---- Commun ----
      TENANT_ID: ${CLIENT_NAME:-default}
      OLLAMA_URL: http://ollama:11434
      LLM_EMBED: ${LLM_EMBED:-bge-m3}
      QDRANT_URL: http://aibox-qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-30}
    volumes:
      - rag_msgraph_state:/data
      - ${AIBOX_CONNECTORS_LIB_PATH:-../_lib}:/lib_shared:ro
    networks:
      - aibox_net
      - ollama_net

volumes:
  rag_msgraph_state:
    name: aibox_conn_rag_msgraph_state

networks:
  aibox_net:
    name: ${NETWORK_NAME:-aibox_net}
    external: true
  ollama_net:
    name: ollama_net
    external: true
