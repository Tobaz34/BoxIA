name: aibox-conn-social-linkedin

services:
  social-linkedin:
    build: .
    image: aibox-conn-social-linkedin:0.1.0
    container_name: aibox-conn-social-linkedin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8093:8000"
    environment:
      LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:?LINKEDIN_ACCESS_TOKEN required}
      LINKEDIN_ORGANIZATION_URN: ${LINKEDIN_ORGANIZATION_URN:?LINKEDIN_ORGANIZATION_URN required}
      LINKEDIN_TOOL_API_KEY: ${LINKEDIN_TOOL_API_KEY:?LINKEDIN_TOOL_API_KEY required}
      LINKEDIN_API_VERSION: ${LINKEDIN_API_VERSION:-202410}
      TENANT_ID: ${CLIENT_NAME:-default}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - aibox_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 256m
    mem_reservation: 64m

networks:
  aibox_net:
    name: ${NETWORK_NAME:-aibox_net}
    external: true
