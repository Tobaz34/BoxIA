# =============================================================================
# AI Box — Application principale (front unifié custom)
# =============================================================================
# Cette app remplace l'expérience par défaut "page configured + 6 tuiles".
# Au prochain reset, on la rendra accessible direct sur http://aibox.local
# (le wizard ne servant qu'au 1er démarrage).
# =============================================================================

name: aibox-app

services:
  # Init container : fixe les permissions de /srv/ai-stack/data au boot.
  # Le container `app` tourne en uid 1001 (user nextjs, Dockerfile services/app)
  # — sans ce step, un /data fraîchement créé en root rejette tout fs.writeFile
  # avec EACCES (custom-agents.json, audit.jsonl, connectors.json, etc).
  # Tourne en root, fait le chown, et exit 0 → le service `app` démarre ensuite.
  data-init:
    image: busybox:1.37
    container_name: aibox-app-data-init
    user: "0:0"
    entrypoint: ["sh", "-c"]
    command:
      - "mkdir -p /data && chown -R 1001:1001 /data && chmod 755 /data && echo '[data-init] /data ready (uid=1001)'"
    volumes:
      - /srv/ai-stack/data:/data
    restart: "no"

  app:
    build:
      context: .
      # Build-args remontés au Dockerfile pour générer public/version.json
      # avec le vrai commit_sha + date + message + branch. Sans ça, le
      # bouton « Vérifier les mises à jour » de /settings ne peut pas
      # comparer le commit local au tip de main (cf
      # services/app/src/app/api/system/check-updates).
      # tools/deploy-to-xefia.sh exporte ces vars depuis git rev-parse
      # avant d'invoquer compose build.
      args:
        BUILD_COMMIT_SHA: "${BUILD_COMMIT_SHA:-}"
        BUILD_COMMIT_DATE: "${BUILD_COMMIT_DATE:-}"
        BUILD_COMMIT_MESSAGE: "${BUILD_COMMIT_MESSAGE:-}"
        BUILD_BRANCH: "${BUILD_BRANCH:-}"
    container_name: aibox-app
    depends_on:
      data-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # network_mode: host = le container partage le namespace réseau de l'hôte.
    # Avantage : il joint TOUS les services via localhost:<port> et l'IP LAN
    # du serveur (pas de hairpin Docker, pas de DNS interne incohérent).
    # Inconvénient : pas d'isolation réseau.
    network_mode: host
    volumes:
      # Pour interroger les containers (statut connecteurs)
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistance applicative (état des connecteurs activés, settings,
      # éventuellement audit log custom à venir).
      - /srv/ai-stack/data:/data
      # Documents pré-écrits pour la démo client (seed-data du repo).
      # L'admin peut les charger en 1 clic depuis /settings.
      - /srv/ai-stack/seed-data:/seed-data:ro
      # Templates de workflows n8n + agents Dify (read-only).
      # Utilisé par /api/workflows/import-templates pour push les
      # workflows pré-écrits dans n8n en 1 clic depuis /workflows.
      - /srv/ai-stack/templates:/templates:ro
      # CHANGELOG.md du repo bind-mounté pour /api/version qui l'expose
      # à la carte « Version & mises à jour » de /settings. Avantage par
      # rapport à un COPY au build : le changelog peut être mis à jour
      # sans rebuilder l'image.
      - /srv/ai-stack/CHANGELOG.md:/CHANGELOG.md:ro
      # Repo bind-mounté en RO pour permettre à /api/bench/run de spawn
      # le runner Python tools/bench/run-bench.py. Sans ça, le bouton
      # « Lancer un bench » de /bench renvoie 503 runner_not_found.
      # Lecture seule : le subprocess écrit ses résultats dans /data/bench/
      # (pas dans /repo).
      - /srv/ai-stack:/repo:ro
    environment:
      # En host mode, on doit dire à Next.js d'écouter sur le port custom
      PORT: "${APP_PORT:-3100}"
      HOSTNAME: "0.0.0.0"

      # En LAN avec ACME_CA=internal, le cert HTTPS de l'edge Caddy est
      # auto-signé. NextAuth (back-channel server → https://aibox-auth.local)
      # rejetterait sinon. ATTENTION : la sémantique est INVERSE — quand on
      # veut PERMETTRE le self-signed, on met NODE_TLS_REJECT_UNAUTHORIZED=0.
      # Donc :  ALLOW_SELF_SIGNED=1 → NODE_TLS_REJECT_UNAUTHORIZED=0
      #         ALLOW_SELF_SIGNED=0 → NODE_TLS_REJECT_UNAUTHORIZED=1 (default safe)
      # En prod (Let's Encrypt) cette var doit rester à 1.
      NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-1}"

      # ---- NextAuth ----
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3100}
      NEXTAUTH_SECRET: ${APP_NEXTAUTH_SECRET}

      # ---- Authentik OIDC ----
      # En host mode, localhost:9000 = le port mappé par Authentik
      AUTHENTIK_ISSUER: ${AUTHENTIK_APP_ISSUER:-http://localhost:9000/application/o/aibox-app/}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_APP_CLIENT_ID:-aibox-app}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_APP_CLIENT_SECRET}

      # ---- Admin credentials pour Dify Console API (édition agents) ----
      # Permet à l'app d'éditer la config des agents (pre_prompt, opening,
      # suggestions) via /console/api. Sans ces vars, la page /agents reste
      # en lecture seule pour les non-admins.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # ---- Backend services (via ports host-mapped) ----
      DIFY_BASE_URL: http://localhost:8081
      N8N_BASE_URL: http://localhost:5678
      OWUI_BASE_URL: http://localhost:3000
      PROMETHEUS_URL: http://localhost:9090
      AUTHENTIK_API_URL: http://localhost:9000
      AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN:-}

      # Clés API Dify des agents (créés au wizard).
      # DIFY_DEFAULT_APP_API_KEY = agent "Assistant général" (toujours présent).
      # Les autres sont optionnels — si vide, l'agent est masqué dans le picker.
      DIFY_DEFAULT_APP_API_KEY:        ${DIFY_DEFAULT_APP_API_KEY:-}
      DIFY_AGENT_ACCOUNTANT_API_KEY:   ${DIFY_AGENT_ACCOUNTANT_API_KEY:-}
      DIFY_AGENT_HR_API_KEY:           ${DIFY_AGENT_HR_API_KEY:-}
      DIFY_AGENT_SUPPORT_API_KEY:      ${DIFY_AGENT_SUPPORT_API_KEY:-}
      DIFY_AGENT_VISION_API_KEY:       ${DIFY_AGENT_VISION_API_KEY:-}
      # Concierge BoxIA — agent orchestrateur qui pilote l'admin via
      # /api/agents-tools/* (Custom Tool Dify « BoxIA Concierge Tools »
      # attaché auto via setup_dify_default_agent).
      DIFY_AGENT_CONCIERGE_API_KEY:    ${DIFY_AGENT_CONCIERGE_API_KEY:-}

      # Knowledge Base (Phase C — documents partagés + RAG).
      # Service API Dataset (Bearer dataset-...) — différent des app keys.
      DIFY_KB_API_KEY:                 ${DIFY_KB_API_KEY:-}
      DIFY_DEFAULT_DATASET_ID:         ${DIFY_DEFAULT_DATASET_ID:-}

      # ---- Mémoire long-terme (mem0 sidecar, optionnel) ----
      # Si MEM0_API_KEY défini : injecte les facts dans le 1er prompt de
      # chaque conversation + sauvegarde l'échange en background.
      # Si vide : feature désactivée silencieusement (pas d'erreur).
      MEM0_API_KEY:                    ${MEM0_API_KEY:-}
      MEM0_BASE_URL:                   ${MEM0_BASE_URL:-http://aibox-mem0:8000}

      # ---- Observability Langfuse (optionnel) ----
      # Si LANGFUSE_PUBLIC_KEY défini : trace chaque message du chat
      # (input, output, latence, user, agent) vers Langfuse en
      # fire-and-forget. Si vide : no-op silencieux.
      LANGFUSE_BASE_URL:               ${LANGFUSE_BASE_URL:-}
      LANGFUSE_PUBLIC_KEY:             ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY:             ${LANGFUSE_SECRET_KEY:-}

      # ---- TTS Piper (optionnel) ----
      # Si TTS_BACKEND_URL défini : useTTS bascule sur le backend serveur
      # (qualité supérieure à Web Speech API). Sinon : fallback Web Speech.
      TTS_BACKEND_URL:                 ${TTS_BACKEND_URL:-}
      TTS_DEFAULT_VOICE:               ${TTS_DEFAULT_VOICE:-larynx:siwis-glow_tts}

      # ---- SearXNG web search (optionnel, tool Concierge) ----
      # Si SEARXNG_URL défini : le tool /api/agents-tools/web_search
      # devient fonctionnel. Sinon : retourne 503 search_disabled.
      SEARXNG_URL:                     ${SEARXNG_URL:-}

      # ---- Agents autonomes sidecar (optionnel) ----
      AGENTS_API_KEY:                  ${AGENTS_API_KEY:-}
      AGENTS_BASE_URL:                 ${AGENTS_BASE_URL:-http://aibox-agents:8000}

      # ---- n8n owner password ----
      # n8n exige password fort (8+ chars, 1 maj, 1 chiffre). Le ADMIN_PASSWORD
      # principal ne respecte pas toujours la règle (cf. install.sh gen_secret).
      # On utilise un password dédié, généré par install.sh / setup_n8n_owner.
      # lib/n8n.ts lit N8N_PASSWORD en priorité, fallback ADMIN_PASSWORD.
      N8N_PASSWORD:                    ${N8N_PASSWORD:-}

      # ---- Connecteurs sidecars (URLs) ----
      PENNYLANE_TOOL_URL:              ${PENNYLANE_TOOL_URL:-http://127.0.0.1:8090}
      FEC_TOOL_URL:                    ${FEC_TOOL_URL:-http://127.0.0.1:8091}

      # ---- Branding ----
      BRAND_NAME: ${BRAND_NAME:-AI Box}
      BRAND_LOGO_URL: ${BRAND_LOGO_URL:-}
      BRAND_PRIMARY_COLOR: ${BRAND_PRIMARY_COLOR:-#3b82f6}
      BRAND_ACCENT_COLOR: ${BRAND_ACCENT_COLOR:-#10b981}
      BRAND_FOOTER_TEXT: ${BRAND_FOOTER_TEXT:-}
      CLIENT_NAME: ${CLIENT_NAME:-}
