name: Release

# Déclenché par push de tag vX.Y.Z (semver).
on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  build-connectors:
    name: Build & push connector images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        connector:
          - rag-smb
          - rag-msgraph
          - rag-gdrive
          - rag-nextcloud
          - email-msgraph
          - email-imap
          - erp-odoo
          - text2sql
          - helpdesk-glpi
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push ${{ matrix.connector }}
        uses: docker/build-push-action@v5
        with:
          context: services/connectors/${{ matrix.connector }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/aibox-conn-${{ matrix.connector }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/aibox-conn-${{ matrix.connector }}:latest

  build-setup-wizard:
    name: Build & push setup wizard image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: services/setup/app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/aibox-setup:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/aibox-setup:latest

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-connectors, build-setup-wizard]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%an)" "${PREV_TAG}..${{ github.ref_name }}")
          else
            CHANGES=$(git log --pretty=format:"- %s (%an)" ${{ github.ref_name }})
          fi
          {
            echo 'changes<<EOF'
            echo "$CHANGES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          name: AI Box ${{ github.ref_name }}
          body: |
            ## Changements depuis la version précédente

            ${{ steps.changelog.outputs.changes }}

            ## Mise à jour d'une box existante

            ```bash
            cd /srv/ai-stack
            git fetch --all --tags
            git checkout ${{ github.ref_name }}
            ./update.sh
            ```

            ## Images Docker publiées

            Tag : `${{ github.ref_name }}` + `latest` sur `ghcr.io/${{ github.repository }}/*`
          generate_release_notes: false
          draft: false
          prerelease: false
