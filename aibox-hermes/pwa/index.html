<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>AI Box</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>AI Box</h1>
    <button id="settings-btn" title="Réglages" aria-label="Réglages">⚙️</button>
  </header>

  <dialog id="settings">
    <form method="dialog">
      <h2>Réglages</h2>
      <label>Adresse de l'AI Box
        <input id="endpoint" type="url" placeholder="http://192.168.1.100:9119" />
      </label>
      <label>Clé d'accès (API)
        <input id="apikey" type="password" placeholder="Bearer…" />
      </label>
      <menu>
        <button value="cancel">Annuler</button>
        <button id="save" value="default">Enregistrer</button>
      </menu>
    </form>
  </dialog>

  <main id="messages" aria-live="polite"></main>

  <form id="composer">
    <textarea id="input" rows="1" placeholder="Écris ton message…" autocomplete="off"></textarea>
    <button id="send" type="submit">➤</button>
  </form>

  <script src="app.js"></script>
</body>
</html>
