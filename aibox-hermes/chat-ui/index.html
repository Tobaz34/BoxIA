<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI Box</title>
  <link rel="stylesheet" href="chat.css" />
  <!-- Mode "embed" : quand le chat est intégré comme onglet du dashboard Hermes
       (iframe ?embed=1), on masque la topbar (le dashboard fournit déjà son chrome). -->
  <script>if(location.search.indexOf('embed=1')>-1)document.documentElement.classList.add('embed');</script>
  <!-- Le token de session (par utilisateur) est récupéré par chat.js depuis
       ./session, servi derrière Authentik. Aucun secret dans ce fichier. -->
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-dot"></span>AI&nbsp;Box</div>
    <button id="new-chat" class="ghost" title="Nouvelle conversation">＋ Nouvelle conversation</button>
  </header>

  <main id="thread" class="thread">
    <div class="empty" id="empty">
      <div class="empty-logo">AI</div>
      <h1>Bonjour 👋</h1>
      <p>Je suis votre assistant. Posez-moi une question, ou commencez par&nbsp;:</p>
      <div class="suggestions" id="suggestions">
        <button class="suggestion" data-prompt="Rédige un e-mail de relance professionnel pour une facture impayée.">
          ✉️ Rédiger un e-mail de relance
        </button>
        <button class="suggestion" data-prompt="Résume ce texte en 5 points clés : ">
          📝 Résumer un texte
        </button>
        <button class="suggestion" data-prompt="Explique-moi simplement la différence entre un devis et une facture.">
          💡 Expliquer une notion
        </button>
        <button class="suggestion" data-prompt="Propose un plan pour un compte-rendu de réunion d'équipe.">
          📅 Préparer un compte-rendu
        </button>
      </div>
    </div>
  </main>

  <form id="composer" class="composer">
    <textarea id="input" rows="1" placeholder="Écrivez votre message…" autocomplete="off" enterkeyhint="send"></textarea>
    <button id="send" type="button" class="send" aria-label="Envoyer" title="Envoyer">
      <svg class="ic-send" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3.4 20.4 21 12 3.4 3.6 3 10l12 2-12 2z"/></svg>
      <svg class="ic-stop" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
    </button>
  </form>
  <div id="status" class="status"></div>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script src="chat.js"></script>
</body>
</html>
